name: UI E2E

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Restore backend
        run: dotnet restore VisionPaint.sln

      - name: Publish backend for E2E
        run: dotnet publish backend/VisionPaint.csproj --configuration Release --output "${{ runner.temp }}/e2e-api" --no-restore

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build frontend for E2E
        run: npx vite build
        working-directory: ./frontend
        env:
          VITE_API_URL: http://127.0.0.1:5100/api
          PLAYWRIGHT: "1"

      - name: Install Playwright browsers
        run: npx playwright install chromium
        working-directory: ./frontend

      - name: Add swap (avoid OOM during Playwright)
        run: |
          SWAPFILE=/mnt/playwright-e2e.swap
          if ! swapon --show=NAME --noheadings | grep -qx "$SWAPFILE"; then
            sudo fallocate -l 8G "$SWAPFILE" || sudo dd if=/dev/zero of="$SWAPFILE" bs=1M count=8192
            sudo chmod 600 "$SWAPFILE"
            sudo mkswap "$SWAPFILE"
            sudo swapon "$SWAPFILE"
          fi
          sudo sysctl vm.swappiness=80
          swapon --show
          free -h

      - name: Prepare E2E database
        run: npm run test:e2e:prepare-db
        working-directory: ./frontend
        env:
          VISIONPAINT_TEST_PGADMIN: Host=localhost;Port=5432;Username=postgres;Password=${{ secrets.CI_POSTGRES_PASSWORD }};Database=postgres

      - name: Start E2E servers
        run: npm run test:e2e:start-servers
        working-directory: ./frontend
        env:
          CI: true
          PLAYWRIGHT_API_DLL: ${{ runner.temp }}/e2e-api/VisionPaint.dll
          VISIONPAINT_TEST_PGADMIN: Host=localhost;Port=5432;Username=postgres;Password=${{ secrets.CI_POSTGRES_PASSWORD }};Database=postgres

      - name: Run Playwright E2E tests
        run: npm run test:e2e:ci
        working-directory: ./frontend
        env:
          CI: true
          PLAYWRIGHT_SKIP_WEBSERVER: "true"
          PLAYWRIGHT_SKIP_DB_PREP: "true"
          VISIONPAINT_TEST_PGADMIN: Host=localhost;Port=5432;Username=postgres;Password=${{ secrets.CI_POSTGRES_PASSWORD }};Database=postgres

      - name: Stop E2E servers
        if: always()
        run: npm run test:e2e:stop-servers
        working-directory: ./frontend

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
