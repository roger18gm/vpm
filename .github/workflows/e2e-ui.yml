name: UI E2E

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Restore backend
        run: dotnet restore VisionPaint.sln

      - name: Build backend
        run: dotnet build backend/VisionPaint.csproj --configuration Release --no-restore

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Create UI E2E database
        run: createdb -h localhost -p 5432 -U postgres visionpaint_e2e
        env:
          PGPASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}

      - name: Apply database migrations
        run: |
          for migration in database/migrations/*.sql; do
            psql -h localhost -p 5432 -U postgres -d visionpaint_e2e -f "$migration"
          done
        env:
          PGPASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: ./frontend

      - name: Start backend
        run: |
          nohup dotnet run --project backend/VisionPaint.csproj --configuration Release --no-build --urls http://127.0.0.1:5100 > backend-e2e.log 2>&1 &
        env:
          ASPNETCORE_ENVIRONMENT: E2E
          ConnectionStrings__DefaultConnection: Host=127.0.0.1;Port=5432;Username=postgres;Password=${{ secrets.CI_POSTGRES_PASSWORD }};Database=visionpaint_e2e
          VISIONPAINT_CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173

      - name: Start frontend
        run: |
          nohup npm run dev -- --host 127.0.0.1 --port 5173 > frontend-e2e.log 2>&1 &
        working-directory: ./frontend
        env:
          VITE_API_URL: http://127.0.0.1:5100/api

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl --fail --silent http://127.0.0.1:5100/api/auth/status > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat backend-e2e.log
          exit 1

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            if curl --fail --silent http://127.0.0.1:5173 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat frontend/frontend-e2e.log
          exit 1

      - name: Run Playwright tests
        run: npm run test:e2e
        working-directory: ./frontend
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
            backend-e2e.log
            frontend/frontend-e2e.log
